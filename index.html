<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网盘字幕助手 v4.0 - 双路实战版</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #f0f2f5; color: #333; line-height: 1.5; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h3 { margin-top: 0; color: #1a73e8; font-size: 18px; }
        textarea { width: 100%; height: 100px; border: 2px solid #eee; border-radius: 12px; padding: 12px; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.3s; }
        textarea:focus { border-color: #1a73e8; }
        .tag-container { margin: 10px 0; min-height: 30px; }
        .tag { display: inline-block; background: #e8f0fe; color: #1967d2; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin: 0 6px 6px 0; font-weight: bold; }
        
        /* 按钮布局 */
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; border: none; padding: 15px; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; }
        .btn-google { background: #4285f4; }
        .btn-pro { background: #34a853; }
        .btn:active { transform: scale(0.95); opacity: 0.9; }

        .result-item { background: white; padding: 15px; border-radius: 15px; border-left: 6px solid #4285f4; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .copy-btn { width: 100%; margin-top: 10px; padding: 10px; border-radius: 8px; border: 1.5px dashed #4285f4; color: #4285f4; background: #f8f9fa; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h3>🎬 粘贴文件名</h3>
    <textarea id="name-input" placeholder="长按粘贴电影文件名..."></textarea>
    
    <div id="tags-container" class="tag-container"></div>

    <div class="btn-group">
        <button class="btn btn-google" id="google-btn">谷歌全网搜</button>
        <button class="btn btn-pro" id="pro-btn">专业站</button>
    </div>
</div>

<div id="results-list"></div>

<script>
    const input = document.getElementById('name-input');
    const tagsBox = document.getElementById('tags-container');
    const googleBtn = document.getElementById('google-btn');
    const proBtn = document.getElementById('pro-btn');
    const resultsList = document.getElementById('results-list');

    let currentInfo = { name: '', year: '' };

    // 自动解析逻辑
    input.oninput = () => {
        const raw = input.value.trim();
        if (!raw) return;

        // 1. 提取纯净电影名 (提取到年份前)
        const nameMatch = raw.match(/^(.+?)\b(?:19|20)\d{2}\b/i);
        currentInfo.name = nameMatch ? nameMatch[1].replace(/\./g, ' ').trim() : raw.split('.')[0];

        // 2. 提取年份
        currentInfo.year = raw.match(/\b(19|20)\d{2}\b/)?.[0] || "";

        // 显示标签
        tagsBox.innerHTML = `
            ${currentInfo.name ? `<span class="tag">📽️ ${currentInfo.name}</span>` : ''}
            ${currentInfo.year ? `<span class="tag">📅 ${currentInfo.year}</span>` : ''}
        `;
    };

    // 谷歌搜索：带上“下载”和“.srt”咒语
    googleBtn.onclick = () => {
        if (!input.value) return;
        const query = `${currentInfo.name} ${currentInfo.year} .srt 下载`;
        window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
        showCopyArea();
    };

    // 专业站搜索：直接去字幕库
    proBtn.onclick = () => {
        if (!input.value) return;
        const query = `${currentInfo.name} ${currentInfo.year}`;
        // 跳转到字幕库搜索页
        window.open(`https://www.zimuku.org/search?q=${encodeURIComponent(query)}`, '_blank');
        showCopyArea();
    };

    function showCopyArea() {
        resultsList.innerHTML = `
            <div class="result-item">
                <div style="font-size: 13px; color: #666;">💡 搜到字幕下载后，点击下方复制原名：</div>
                <button class="copy-btn" onclick="copyToClipboard()">📋 复制视频原名 (重命名用)</button>
            </div>
        `;
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(input.value.trim()).then(() => {
            alert("已复制！下载好字幕后直接粘贴重命名即可。");
        });
    }
</script>

</body>
</html>
